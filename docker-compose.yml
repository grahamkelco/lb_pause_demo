services:
  lb:
    build:
      context: .
      dockerfile: lb/Dockerfile
    container_name: backpressure-lb
    network_mode: host
    depends_on:
      - sinkhole-1
      - sinkhole-2
      - sinkhole-3
      - sinkhole-4
      - sinkhole-random-1
      - sinkhole-random-2
      - sinkhole-random-3
      - sinkhole-random-4
      - simulated-pause-1
      - simulated-pause-2
      - simulated-pause-3
      - simulated-pause-4
      - java-gc-1
      - java-gc-2
      - java-gc-3
      - java-gc-4

  # --- Sinkhole servers (always healthy) ---
  sinkhole-1:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8001

  sinkhole-2:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8002

  sinkhole-3:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8003

  sinkhole-4:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8004

  sidecar-1:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9001
      - METRICS_PORT=9101
      - HEALTH_CHECKS=always_healthy
    depends_on:
      - lb
      - sinkhole-1

  sidecar-2:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9002
      - METRICS_PORT=9102
      - HEALTH_CHECKS=always_healthy
    depends_on:
      - lb
      - sinkhole-2

  sidecar-3:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9003
      - METRICS_PORT=9103
      - HEALTH_CHECKS=always_healthy
    depends_on:
      - lb
      - sinkhole-3

  sidecar-4:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9004
      - METRICS_PORT=9104
      - HEALTH_CHECKS=always_healthy
    depends_on:
      - lb
      - sinkhole-4

  # --- Sinkhole-random servers (random health check) ---
  sinkhole-random-1:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8005

  sinkhole-random-2:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8006

  sinkhole-random-3:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8007

  sinkhole-random-4:
    build:
      context: .
      target: sinkhole
    network_mode: host
    environment:
      - PORT=8008

  sidecar-random-1:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9005
      - METRICS_PORT=9105
      - HEALTH_CHECKS=random
    depends_on:
      - lb
      - sinkhole-random-1

  sidecar-random-2:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9006
      - METRICS_PORT=9106
      - HEALTH_CHECKS=random
    depends_on:
      - lb
      - sinkhole-random-2

  sidecar-random-3:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9007
      - METRICS_PORT=9107
      - HEALTH_CHECKS=random
    depends_on:
      - lb
      - sinkhole-random-3

  sidecar-random-4:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9008
      - METRICS_PORT=9108
      - HEALTH_CHECKS=random
    depends_on:
      - lb
      - sinkhole-random-4

  # --- Simulated-pause servers (CPU work + random GC pauses) ---
  simulated-pause-1:
    build:
      context: .
      target: simulated-pause
    network_mode: host
    environment:
      - PORT=8009
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=9201

  simulated-pause-2:
    build:
      context: .
      target: simulated-pause
    network_mode: host
    environment:
      - PORT=8010
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=9202

  simulated-pause-3:
    build:
      context: .
      target: simulated-pause
    network_mode: host
    environment:
      - PORT=8011
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=9203

  simulated-pause-4:
    build:
      context: .
      target: simulated-pause
    network_mode: host
    environment:
      - PORT=8012
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=9204

  sidecar-simulated-pause-1:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9009
      - METRICS_PORT=9109
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9201
    depends_on:
      - lb
      - simulated-pause-1

  sidecar-simulated-pause-2:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9010
      - METRICS_PORT=9110
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9202
    depends_on:
      - lb
      - simulated-pause-2

  sidecar-simulated-pause-3:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9011
      - METRICS_PORT=9111
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9203
    depends_on:
      - lb
      - simulated-pause-3

  sidecar-simulated-pause-4:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9012
      - METRICS_PORT=9112
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9204
    depends_on:
      - lb
      - simulated-pause-4

  # --- Java GC servers (real JVM GC pauses via G1GC) ---
  java-gc-1:
    build:
      context: .
      target: java-gc
    network_mode: host
    environment:
      - PORT=8013
      - GC_NOTIFY_HOST=127.0.0.1
      - GC_NOTIFY_PORT=9205

  java-gc-2:
    build:
      context: .
      target: java-gc
    network_mode: host
    environment:
      - PORT=8014
      - GC_NOTIFY_HOST=127.0.0.1
      - GC_NOTIFY_PORT=9206

  java-gc-3:
    build:
      context: .
      target: java-gc
    network_mode: host
    environment:
      - PORT=8015
      - GC_NOTIFY_HOST=127.0.0.1
      - GC_NOTIFY_PORT=9207

  java-gc-4:
    build:
      context: .
      target: java-gc
    network_mode: host
    environment:
      - PORT=8016
      - GC_NOTIFY_HOST=127.0.0.1
      - GC_NOTIFY_PORT=9208

  sidecar-java-gc-1:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9013
      - METRICS_PORT=9113
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9205
    depends_on:
      - lb
      - java-gc-1

  sidecar-java-gc-2:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9014
      - METRICS_PORT=9114
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9206
    depends_on:
      - lb
      - java-gc-2

  sidecar-java-gc-3:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9015
      - METRICS_PORT=9115
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9207
    depends_on:
      - lb
      - java-gc-3

  sidecar-java-gc-4:
    build:
      context: .
      target: sidecar
    network_mode: host
    environment:
      - LB_HOST=127.0.0.1
      - LB_PORT=9016
      - METRICS_PORT=9116
      - HEALTH_CHECKS=gc_pause
      - GC_PAUSE_UDP_PORT=9208
    depends_on:
      - lb
      - java-gc-4

  generator:
    build:
      context: .
      target: generator
    network_mode: host
    environment:
      - PORT=8081
    command: ["node", "generator/dist/cli.js", "--server", "--port", "8081"]

  web:
    build:
      context: .
      target: web
    network_mode: host
    environment:
      - GENERATOR_HOST=127.0.0.1
      - GENERATOR_PORT=8081
      - LB_HOST=127.0.0.1
      - LB_PORT=8080
      - WEB_PORT=3001
